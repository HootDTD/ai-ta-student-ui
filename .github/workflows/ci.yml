# CI for the student UI (Next.js).
#
# `ci-passed` is the aggregation job — the single status to require in branch
# protection and for Railway's "Wait for CI" deploy gate. Add test jobs later
# (vitest/playwright) by listing them in its `needs` — the required-check name
# stays stable.
#
# Branch model: ApolloV3 = production line (Railway prod), staging = integration
# (Railway staging). `main` kept for legacy PRs.
name: CI

on:
  push:
    branches: [main, staging, ApolloV3]
  pull_request:
    branches: [main, staging, ApolloV3]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  ci-passed:
    name: ci-passed
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Assert required jobs passed
        run: |
          echo "build=${{ needs.build.result }}"
          test "${{ needs.build.result }}" = "success"
